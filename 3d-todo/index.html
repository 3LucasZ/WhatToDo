<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>path — 3d todo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  body {
    height: 100vh;
    overflow: hidden;
    background: #080816;
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ---- HUD ---- */
  .hud {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    font-size: 13px;
    transition: opacity 0.5s;
  }
  .hud-title {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 3px;
  }
  .hud-count { color: rgba(255,255,255,0.35); }
  .hud-count span { color: rgba(255,255,255,0.6); }

  /* ---- progress ---- */
  .progress-wrap {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
  }
  .progress-track {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
    margin: 0 auto;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6b35, #4488ff);
    border-radius: 1px;
    transition: width 0.15s;
  }
  .progress-label {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ---- add button ---- */
  .add-btn {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.5);
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-family: inherit;
  }
  .add-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
    transform: translateX(-50%) scale(1.06);
    color: #fff;
  }

  /* ---- modal ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: rgba(14, 14, 30, 0.92);
    border: 1px solid rgba(100, 150, 255, 0.12);
    border-radius: 14px;
    padding: 28px 32px 24px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 60px rgba(60, 100, 200, 0.05);
    transform: scale(0.95) translateY(12px);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 16px;
    color: rgba(255,255,255,0.85);
  }

  .modal input,
  .modal textarea {
    display: block;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus,
  .modal textarea:focus {
    border-color: rgba(100, 150, 255, 0.3);
  }
  .modal input {
    margin-bottom: 12px;
    font-weight: 500;
  }
  .modal textarea {
    min-height: 76px;
    resize: vertical;
    color: rgba(255,255,255,0.6);
  }
  .modal textarea::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .modal .meta {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    margin: 12px 0 0;
    letter-spacing: 0.3px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
  }
  .modal-actions button {
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    font-weight: 500;
  }
  .modal-actions .btn-cancel {
    background: transparent;
    color: rgba(255,255,255,0.4);
  }
  .modal-actions .btn-cancel:hover {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
  }
  .modal-actions .btn-done {
    background: rgba(255, 200, 50, 0.12);
    color: #ffd866;
    border: 1px solid rgba(255, 200, 50, 0.15);
  }
  .modal-actions .btn-done:hover {
    background: rgba(255, 200, 50, 0.2);
  }
  .modal-actions .btn-delete {
    background: transparent;
    color: rgba(255, 80, 60, 0.4);
    margin-right: auto;
  }
  .modal-actions .btn-delete:hover {
    background: rgba(255, 80, 60, 0.1);
    color: rgba(255, 80, 60, 0.7);
  }
  .modal-actions .btn-add {
    background: rgba(100, 150, 255, 0.12);
    color: #88bbff;
    border: 1px solid rgba(100, 150, 255, 0.15);
  }
  .modal-actions .btn-add:hover {
    background: rgba(100, 150, 255, 0.2);
  }

  /* ---- task label ---- */
  .task-label {
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-shadow: 0 1px 10px rgba(0,0,0,0.9);
    background: rgba(10, 10, 30, 0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 3px 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: auto;
    cursor: pointer;
    transition: opacity 0.4s ease, border-color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .task-label:hover {
    border-color: rgba(255,255,255,0.2);
  }
  .task-label.done {
    border-color: rgba(255, 215, 0, 0.2);
    background: rgba(30, 20, 0, 0.4);
  }
  .task-label.done::before {
    content: '✦ ';
    color: #ffd700;
    font-size: 10px;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud" id="hud">
  <div class="hud-title">path</div>
  <div class="hud-count"><span id="taskCount">0</span> tasks ahead</div>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">along the path</div>
</div>

<button class="add-btn" id="addBtn">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">add task</h2>
    <input id="taskTitle" placeholder="what's next?" maxlength="60">
    <textarea id="taskBody" placeholder="notes... (optional)" maxlength="300"></textarea>
    <div class="meta" id="modalMeta"></div>
    <div class="modal-actions" id="modalActions">
      <button class="btn-cancel" id="modalCancel">cancel</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ============================================================
   STATE
   ============================================================ */
const state = {
  tasks: [],
  nextId: 1,
  player: {
    currentProgress: 0.25,
    targetProgress: 0.25,
    azimuth: 0,
    targetAzimuth: 0,
    elevation: 0.35,
    targetElevation: 0.35,
  },
  editingTaskId: null,  // non-null when modal is for editing an existing task
};

let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragAzimuth = 0;
let dragElevation = 0;
let dragDist = 0;
let hoveredTask = null;

/* ============================================================
   SCENE SETUP
   ============================================================ */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080816);
scene.fog = new THREE.FogExp2(0x080816, 0.008);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const cssRenderer = new CSS2DRenderer();
cssRenderer.setSize(window.innerWidth, window.innerHeight);
cssRenderer.domElement.style.position = 'absolute';
cssRenderer.domElement.style.top = '0';
cssRenderer.domElement.style.left = '0';
cssRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(cssRenderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x222244, 0.4);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0x4466aa, 0x111122, 0.6);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0x4488ff, 1.2);
dir.position.set(5, 10, -5);
scene.add(dir);
const fill = new THREE.DirectionalLight(0x8844ff, 0.4);
fill.position.set(-5, -2, -10);
scene.add(fill);

/* ============================================================
   STARFIELD
   ============================================================ */
const starCount = 3000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random() - 0.5) * 150;
  starPos[i*3+1] = (Math.random() - 0.5) * 100;
  starPos[i*3+2] = (Math.random() - 0.5) * 200 - 50;
  starSizes[i] = Math.random() * 1.5 + 0.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
const starMat = new THREE.PointsMaterial({
  color: 0x8899cc,
  size: 0.15,
  transparent: true,
  opacity: 0.6,
  sizeAttenuation: true,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

/* ============================================================
   PATH
   ============================================================ */
const PATH_LENGTH = 30;
const pathPoints = [];
for (let i = 0; i <= PATH_LENGTH; i++) {
  const t = i / PATH_LENGTH;
  const z = 35 - t * 80;
  const x = Math.sin(t * Math.PI * 3.5) * 5 + Math.sin(t * Math.PI * 1.2) * 2.5;
  const y = Math.sin(t * Math.PI * 2.7 + 0.8) * 2;
  pathPoints.push(new THREE.Vector3(x, y, z));
}

const curve = new THREE.CatmullRomCurve3(pathPoints);

// Tube geometry for the path
const tubeGeo = new THREE.TubeGeometry(curve, 200, 0.25, 8, false);
const tubeMat = new THREE.MeshStandardMaterial({
  color: 0x3366aa,
  emissive: 0x224488,
  emissiveIntensity: 0.2,
  transparent: true,
  opacity: 0.2,
  side: THREE.DoubleSide,
  roughness: 0.4,
  metalness: 0.1,
  depthWrite: false,
});
const tube = new THREE.Mesh(tubeGeo, tubeMat);
scene.add(tube);

// Thin inner glow line
const innerTubeGeo = new THREE.TubeGeometry(curve, 200, 0.08, 6, false);
const innerTubeMat = new THREE.MeshBasicMaterial({
  color: 0x5588dd,
  transparent: true,
  opacity: 0.25,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const innerTube = new THREE.Mesh(innerTubeGeo, innerTubeMat);
scene.add(innerTube);

// Path particles — tiny lights along the curve
const pathParticleCount = 500;
const ppGeo = new THREE.BufferGeometry();
const ppPos = new Float32Array(pathParticleCount * 3);
for (let i = 0; i < pathParticleCount; i++) {
  const t = i / pathParticleCount;
  const p = curve.getPoint(t);
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.35;
  ppPos[i*3] = p.x + Math.cos(angle) * r;
  ppPos[i*3+1] = p.y + Math.sin(angle) * r * 0.5;
  ppPos[i*3+2] = p.z;
}
ppGeo.setAttribute('position', new THREE.BufferAttribute(ppPos, 3));
const ppMat = new THREE.PointsMaterial({
  color: 0x6699ee,
  size: 0.06,
  transparent: true,
  opacity: 0.4,
  sizeAttenuation: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const pathParticles = new THREE.Points(ppGeo, ppMat);
scene.add(pathParticles);

/* ============================================================
   GLOW TEXTURE
   ============================================================ */
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 128;
glowCanvas.height = 128;
const gctx = glowCanvas.getContext('2d');
const grad = gctx.createRadialGradient(64, 64, 0, 64, 64, 64);
grad.addColorStop(0, 'rgba(255,255,255,0.7)');
grad.addColorStop(0.2, 'rgba(255,255,255,0.25)');
grad.addColorStop(0.5, 'rgba(255,255,255,0.06)');
grad.addColorStop(1, 'rgba(255,255,255,0)');
gctx.fillStyle = grad;
gctx.fillRect(0, 0, 128, 128);
const glowTexture = new THREE.CanvasTexture(glowCanvas);

/* ============================================================
   TASK VISUALS
   ============================================================ */
function hslColor(t) {
  // t: 0 = near player (warm), 1 = far (cool)
  const h = 0.08 - t * 0.45;
  const s = 1;
  const l = 0.55 + t * 0.15;
  return new THREE.Color().setHSL(Math.max(0, h), s, l);
}

function createTaskVisual(task) {
  const group = new THREE.Group();

  const isDone = task.done;
  const baseColor = isDone ? new THREE.Color(0xffd700) : hslColor(Math.min(1, task.pathT));

  // Mesh
  const geo = isDone
    ? new THREE.SphereGeometry(0.28, 12, 12)
    : new THREE.OctahedronGeometry(0.38);
  const mat = new THREE.MeshStandardMaterial({
    color: baseColor,
    emissive: baseColor,
    emissiveIntensity: isDone ? 0.4 : 0.15,
    transparent: true,
    opacity: 1,
    roughness: isDone ? 0.1 : 0.2,
    metalness: isDone ? 0.3 : 0.1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = false;
  mesh.userData.taskId = task.id;
  group.add(mesh);

  // Glow sprite
  const spriteMat2 = new THREE.SpriteMaterial({
    map: glowTexture,
    color: baseColor,
    transparent: true,
    opacity: isDone ? 0.5 : 0.3,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const sprite = new THREE.Sprite(spriteMat2);
  sprite.scale.setScalar(isDone ? 2.5 : 2.0);
  group.add(sprite);

  // Label
  const labelDiv = document.createElement('div');
  labelDiv.className = 'task-label' + (isDone ? ' done' : '');
  labelDiv.textContent = task.title;
  labelDiv.addEventListener('click', (e) => {
    e.stopPropagation();
    openTaskModal(task.id);
  });
  const label = new CSS2DObject(labelDiv);
  label.position.y = 0.7;
  label.userData.taskId = task.id;
  group.add(label);

  // Position on path
  const pos = curve.getPoint(task.pathT);
  group.position.copy(pos);

  // Store references
  task._group = group;
  task._mesh = mesh;
  task._sprite = sprite;
  task._label = label;
  task._labelDiv = labelDiv;
  task._meshMat = mat;
  task._spriteMat = spriteMat2;

  // Store original color for interpolation
  task._origColor = baseColor.clone();
  if (isDone) task._origColorDone = baseColor.clone();

  scene.add(group);
}

function removeTaskVisual(task) {
  if (task._group) {
    scene.remove(task._group);
    // Dispose geometries and materials
    task._mesh.geometry.dispose();
    task._meshMat.dispose();
    task._spriteMat.dispose();
    task._label.element.remove();
  }
}

function updateTaskVisuals(time) {
  const pp = state.player.currentProgress;
  tasksLoop: for (const task of state.tasks) {
    const group = task._group;
    if (!group) continue;

    // Position
    const pos = curve.getPoint(task.pathT);
    group.position.copy(pos);

    // Distance from player along path
    const dist = Math.abs(task.pathT - pp);

    // Scale: larger near player, tiny when far
    const scale = 0.6 * Math.max(0.08, 1 - dist * 1.8);
    group.scale.setScalar(scale);

    // Opacity: fade with distance
    const fadeStart = 0.15;
    const fadeEnd = 0.55;
    let opacity = 1;
    if (dist > fadeStart) {
      opacity = Math.max(0, 1 - (dist - fadeStart) / (fadeEnd - fadeStart));
    }
    opacity = Math.min(1, opacity * 1.2); // slightly brighter up close

    if (!task.done) {
      task._meshMat.opacity = opacity;
      task._spriteMat.opacity = 0.3 * opacity;
      task._labelDiv.style.opacity = opacity;

      // Color shifts with distance
      const colorT = Math.min(1, dist * 0.8);
      const c = hslColor(colorT);
      task._meshMat.color.copy(c);
      task._spriteMat.color.copy(c);
    } else {
      // Done tasks: always gold, subtle pulse
      const pulse = 1 + Math.sin(time * 1.2 + task.pathT * 10) * 0.06;
      task._mesh.scale.setScalar(pulse);
      const doneOpacity = Math.min(1, opacity * 1.5);
      task._meshMat.opacity = doneOpacity;
      task._spriteMat.opacity = 0.5 * doneOpacity;
      task._labelDiv.style.opacity = doneOpacity;
    }

    // Floating bob
    const bob = Math.sin(time * 0.6 + task.pathT * 8) * 0.12;
    group.position.y += bob;

    // Rotation
    if (!task.done) {
      task._mesh.rotation.x += 0.008;
      task._mesh.rotation.y += 0.015;
    }

    // Visibility: hide tasks that are very far or behind with nothing to show
    const behind = task.pathT < pp - 0.4;
    const tooFar = dist > 0.6;
    group.visible = !(behind && task.done === false) && !(tooFar && !task.done);

    // But always show done tasks (golden trail)
    if (task.done) {
      group.visible = true;
      if (dist > 0.7) group.visible = opacity > 0.05;
    }
  }
}

/* ============================================================
   CAMERA CONTROLLER
   ============================================================ */
function updateCamera() {
  const pp = state.player.currentProgress;
  const smoothT = pp;
  const playerPos = curve.getPoint(smoothT);
  const lookTarget = curve.getPoint(Math.min(1, smoothT + 0.04));

  const dist = 6;
  const az = state.player.azimuth;
  const el = state.player.elevation;

  const camX = playerPos.x + dist * Math.sin(az) * Math.cos(el);
  const camY = playerPos.y + dist * Math.sin(el) + 1.5;
  const camZ = playerPos.z + dist * Math.cos(az) * Math.cos(el);

  camera.position.lerp(new THREE.Vector3(camX, camY, camZ), 0.08);
  camera.lookAt(lookTarget);
}

/* ============================================================
   INTERACTION
   ============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function getTaskMeshes() {
  const meshes = [];
  for (const t of state.tasks) {
    if (t._mesh && t._group.visible) meshes.push(t._mesh);
  }
  return meshes;
}

function hitTest(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  scene.updateMatrixWorld(true);
  const meshes = getTaskMeshes();
  return raycaster.intersectObjects(meshes);
}

function handleCanvasClick(clientX, clientY) {
  const hits = hitTest(clientX, clientY);
  if (hits.length > 0) {
    const hit = hits[0].object;
    const id = hit.userData.taskId;
    if (id != null) openTaskModal(id);
  }
}

/* ---- pointer events ---- */
container.addEventListener('pointerdown', (e) => {
  isDragging = true;
  dragDist = 0;
  dragStart.x = e.clientX;
  dragStart.y = e.clientY;
  dragAzimuth = state.player.azimuth;
  dragElevation = state.player.elevation;
  container.setPointerCapture(e.pointerId);
});

container.addEventListener('pointermove', (e) => {
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    dragDist += Math.abs(dx) + Math.abs(dy);
    state.player.targetAzimuth = dragAzimuth - dx * 0.008;
    state.player.targetElevation = Math.max(-0.3, Math.min(1.0, dragElevation + dy * 0.008));
  } else {
    // Hover effect
    const hits = hitTest(e.clientX, e.clientY);
    const hitId = hits.length > 0 ? hits[0].object.userData.taskId : null;
    if (hitId !== hoveredTask) {
      hoveredTask = hitId;
      renderer.domElement.style.cursor = hitId != null ? 'pointer' : 'default';
    }
  }
});

container.addEventListener('pointerup', (e) => {
  const wasDrag = dragDist < 6 ? false : true;
  if (!wasDrag) {
    handleCanvasClick(e.clientX, e.clientY);
  }
  isDragging = false;
});

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY * 0.0003;
  state.player.targetProgress = Math.max(0, Math.min(1, state.player.targetProgress + delta));
}, { passive: false });

/* ---- keyboard ---- */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

/* ============================================================
   MODAL
   ============================================================ */
const overlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const titleInput = document.getElementById('taskTitle');
const bodyInput = document.getElementById('taskBody');
const modalMeta = document.getElementById('modalMeta');
const modalActions = document.getElementById('modalActions');
const cancelBtn = document.getElementById('modalCancel');

function openAddModal() {
  state.editingTaskId = null;
  modalTitle.textContent = 'add task';
  titleInput.value = '';
  bodyInput.value = '';
  modalMeta.textContent = '';
  modalActions.innerHTML = `
    <button class="btn-cancel" id="modalCancelInner">cancel</button>
    <button class="btn-add" id="modalAddInner">place ahead</button>
  `;
  overlay.classList.add('open');
  setTimeout(() => titleInput.focus(), 120);

  document.getElementById('modalCancelInner').addEventListener('click', closeModal);
  document.getElementById('modalAddInner').addEventListener('click', () => {
    const t = titleInput.value.trim();
    if (!t) return;
    addTask(t, bodyInput.value.trim());
    closeModal();
  });
  titleInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('modalAddInner')?.click();
    }
  };
}

function openTaskModal(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  state.editingTaskId = id;

  modalTitle.textContent = task.done ? '✦ done' : 'task';
  titleInput.value = task.title;
  bodyInput.value = task.body || '';

  if (task.done) {
    modalMeta.textContent = 'completed — resting along the path';
    modalActions.innerHTML = `
      <button class="btn-delete" id="modalDelete">remove</button>
      <button class="btn-cancel" id="modalCancelInner">close</button>
    `;
  } else {
    const dist = Math.abs(task.pathT - state.player.currentProgress);
    let where = 'ahead on the path';
    if (dist < 0.1) where = 'right ahead — urgent';
    else if (dist < 0.25) where = 'nearby on the path';
    else if (dist > 0.45) where = 'far ahead on the path';
    modalMeta.textContent = where;
    modalActions.innerHTML = `
      <button class="btn-delete" id="modalDelete">remove</button>
      <button class="btn-cancel" id="modalCancelInner">close</button>
      <button class="btn-done" id="modalDone">complete ✓</button>
    `;
  }

  overlay.classList.add('open');

  document.getElementById('modalCancelInner').addEventListener('click', closeModal);
  const doneBtn = document.getElementById('modalDone');
  if (doneBtn) doneBtn.addEventListener('click', () => { completeTask(id); closeModal(); });
  const delBtn = document.getElementById('modalDelete');
  if (delBtn) delBtn.addEventListener('click', () => { deleteTask(id); closeModal(); });

  // Enter to confirm done, Shift+Enter to close
  titleInput.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doneBtn?.click();
    }
  };
}

function closeModal() {
  overlay.classList.remove('open');
  state.editingTaskId = null;
}

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});

/* ============================================================
   TASK CRUD
   ============================================================ */
const SLOT_COUNT = 40;
function findSlot() {
  const used = new Set(state.tasks.filter(t => !t.done).map(t => Math.round(t.pathT * (SLOT_COUNT - 1))));
  const pp = state.player.currentProgress;
  const startSlot = Math.min(SLOT_COUNT - 1, Math.max(0, Math.round(pp * (SLOT_COUNT - 1)) + 2));
  // Try slots ahead of player first
  for (let i = startSlot; i < SLOT_COUNT; i++) {
    if (!used.has(i)) return i / (SLOT_COUNT - 1);
  }
  // Wrap around to earlier slots
  for (let i = 0; i < startSlot; i++) {
    if (!used.has(i)) return i / (SLOT_COUNT - 1);
  }
  // All full — place at end
  return 0.95;
}

function addTask(title, body) {
  const pathT = findSlot();
  const t = pathT;
  const task = {
    id: state.nextId++,
    title,
    body: body || '',
    pathT: t,
    done: false,
  };
  state.tasks.push(task);
  createTaskVisual(task);
  save();
  updateUI();
}

function completeTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.done) return;
  task.done = true;

  // Update visual
  task._mesh.geometry.dispose();
  task._mesh.geometry = new THREE.SphereGeometry(0.28, 12, 12);
  const gold = new THREE.Color(0xffd700);
  task._meshMat.color.copy(gold);
  task._meshMat.emissive.copy(gold);
  task._meshMat.emissiveIntensity = 0.4;
  task._meshMat.roughness = 0.1;
  task._meshMat.metalness = 0.3;
  task._spriteMat.color.setHex(0xffd700);
  task._spriteMat.opacity = 0.5;
  task._sprite.scale.setScalar(2.5);
  task._labelDiv.className = 'task-label done';

  save();
  updateUI();
}

function deleteTask(id) {
  const idx = state.tasks.findIndex(t => t.id === id);
  if (idx === -1) return;
  removeTaskVisual(state.tasks[idx]);
  state.tasks.splice(idx, 1);
  save();
  updateUI();
}

/* ============================================================
   UI UPDATES
   ============================================================ */
function updateUI() {
  const pending = state.tasks.filter(t => !t.done).length;
  const total = state.tasks.length;
  document.getElementById('taskCount').textContent = pending;
  document.getElementById('progressFill').style.width = (state.player.currentProgress * 100) + '%';
}

window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  cssRenderer.setSize(w, h);
});

/* ============================================================
   SAVE / LOAD
   ============================================================ */
function save() {
  try {
    localStorage.setItem('path-todos', JSON.stringify(state.tasks.map(t => ({
      id: t.id, title: t.title, body: t.body, pathT: t.pathT, done: t.done,
    }))));
    localStorage.setItem('path-nextId', String(state.nextId));
    localStorage.setItem('path-progress', String(state.player.currentProgress));
  } catch {}
}

function load() {
  try {
    const data = JSON.parse(localStorage.getItem('path-todos') || '[]');
    state.tasks = data;
    state.nextId = parseInt(localStorage.getItem('path-nextId') || '1', 10);
    const savedProgress = parseFloat(localStorage.getItem('path-progress'));
    if (!isNaN(savedProgress)) {
      state.player.currentProgress = savedProgress;
      state.player.targetProgress = savedProgress;
    }
    // Rebuild visuals
    for (const task of state.tasks) {
      createTaskVisual(task);
    }
    return data.length > 0;
  } catch {
    state.tasks = [];
    return false;
  }
}

/* ============================================================
   SAMPLES (first visit)
   ============================================================ */
function createSamples() {
  const samples = [
    { title: 'right here', body: 'this task is urgent — closest to you', pathT: 0.28 },
    { title: 'just ahead', body: 'coming up soon on the path', pathT: 0.40 },
    { title: 'someday', body: 'a future aspiration, still far off', pathT: 0.60 },
    { title: 'way out there', body: 'distant and dreamy', pathT: 0.80 },
    { title: 'first step', body: 'you already completed this one', pathT: 0.18, done: true },
  ];
  for (const s of samples) {
    const task = { id: state.nextId++, ...s };
    state.tasks.push(task);
    createTaskVisual(task);
  }
  state.player.currentProgress = 0.25;
  state.player.targetProgress = 0.25;
  save();
}

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Smooth player progress
  const pp = state.player.currentProgress;
  const tp = state.player.targetProgress;
  if (Math.abs(pp - tp) > 0.001) {
    state.player.currentProgress += (tp - pp) * 0.06;
  } else {
    state.player.currentProgress = tp;
  }

  // Smooth camera angles
  state.player.azimuth += (state.player.targetAzimuth - state.player.azimuth) * 0.08;
  state.player.elevation += (state.player.targetElevation - state.player.elevation) * 0.08;

  // Update camera
  updateCamera();

  // Update task visuals
  updateTaskVisuals(time);

  // Rotate starfield
  stars.rotation.y += 0.0001;

  // Progress bar
  document.getElementById('progressFill').style.width = (state.player.currentProgress * 100) + '%';

  // Render
  renderer.render(scene, camera);
  cssRenderer.render(scene, camera);
}

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('addBtn').addEventListener('click', openAddModal);

const hasData = load();
if (!hasData) {
  createSamples();
}
updateUI();
animate();

console.log('🌌 path — scroll to glide, drag to look around, click tasks to interact');
</script>
</body>
</html>
