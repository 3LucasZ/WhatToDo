<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatToDo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="bg-gradients"></div>

<!-- Checkmark burst -->
<div id="check-burst">
  <svg viewBox="0 0 24 24"><polyline points="5,13 9,17 19,7"/></svg>
</div>

<!-- Focus layer (now the only layer) -->
<div id="focus-layer" class="layer active">
  <div id="focus-carousel">
    <div id="focus-track"></div>
  </div>
</div>

<!-- Settings overlay -->
<div id="settings-layer" class="settings-layer">
  <div class="settings-sheet"></div>
</div>

<!-- Bottom bar: dots + add -->
<div id="bottom-bar">
  <div id="ws-dots"></div>
  <button id="ws-add" class="ws-add-btn" aria-label="Add workspace">+</button>
</div>

<!-- Keyboard hint -->
<div id="keyboard-hint">
  <kbd>Space</kbd> complete · <kbd>←</kbd><kbd>→</kbd> workspaces
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
