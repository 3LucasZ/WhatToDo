<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatToDo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="bg-gradients"></div>

<!-- Checkmark burst -->
<div id="check-burst">
  <svg viewBox="0 0 24 24"><polyline points="5,13 9,17 19,7"/></svg>
</div>

<!-- Focus layer (now the only layer) -->
<div id="focus-layer" class="layer active">
  <div id="focus-carousel">
    <div id="focus-track"></div>
  </div>
</div>

<!-- Workspace dots -->
<div id="ws-dots"></div>

<!-- Keyboard hint -->
<div id="keyboard-hint">
  <kbd>Space</kbd> complete · <kbd>←</kbd><kbd>→</kbd> workspaces
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
