<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ledger — a todo list</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7f3e9;
        --paper-line: #e4ddc8;
        --ink: #1b2a4a;
        --ink-soft: #445577;
        --red: #b33a3a;
        --graphite: #8a8578;
        --gold: #c9a227;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Lora", serif;
        min-height: 100%;
      }

      body {
        background-image: repeating-linear-gradient(
          transparent,
          transparent 40px,
          var(--paper-line) 40px,
          var(--paper-line) 41px
        );
        background-position: 0 190px;
      }

      .page {
        max-width: 620px;
        margin: 0 auto;
        padding: 64px 40px 120px 84px;
        position: relative;
        min-height: 100vh;
      }

      /* red margin rule */
      .page::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 56px;
        width: 1px;
        background: var(--red);
        opacity: 0.55;
      }

      /* torn paper top edge */
      .torn {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 14px;
        background:
          linear-gradient(115deg, transparent 49.5%, var(--paper) 50%) 0 0/16px
            14px repeat-x,
          linear-gradient(65deg, transparent 49.5%, var(--paper) 50%) 0 0/16px
            14px repeat-x;
        background-color: #ede7d6;
      }

      header {
        margin-bottom: 46px;
      }

      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--red);
        margin-bottom: 10px;
      }

      h1 {
        font-family: "Lora", serif;
        font-weight: 600;
        font-size: 34px;
        margin: 0 0 6px 0;
        letter-spacing: -0.01em;
      }

      .date {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--ink-soft);
      }

      /* input row */
      .entry-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 34px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--ink);
      }

      .entry-row input {
        flex: 1;
        border: none;
        background: transparent;
        outline: none;
        font-family: "Lora", serif;
        font-size: 17px;
        color: var(--ink);
        padding: 6px 2px;
      }
      .entry-row input::placeholder {
        color: var(--graphite);
        font-style: italic;
      }

      .add-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--paper);
        background: var(--ink);
        border: none;
        padding: 9px 14px;
        cursor: pointer;
        border-radius: 2px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
      }
      .add-btn:hover {
        background: var(--red);
      }
      .add-btn:active {
        transform: scale(0.96);
      }

      ul.list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li.task {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 11px 0;
        border-bottom: 1px solid var(--paper-line);
      }

      .checkbox {
        flex: 0 0 auto;
        width: 18px;
        height: 18px;
        margin-top: 3px;
        border: 1.5px solid var(--ink);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        background: transparent;
        transition: border-color 0.2s ease;
      }
      .checkbox.checked {
        border-color: var(--gold);
        background: rgba(201, 162, 39, 0.12);
      }
      .checkbox svg {
        position: absolute;
        top: -3px;
        left: -3px;
        width: 22px;
        height: 22px;
        pointer-events: none;
      }
      .checkbox svg path {
        fill: none;
        stroke: var(--gold);
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 24;
        stroke-dashoffset: 24;
      }
      .checkbox.checked svg path {
        animation: draw-check 0.32s ease forwards;
      }
      @keyframes draw-check {
        to {
          stroke-dashoffset: 0;
        }
      }

      .task-text {
        flex: 1;
        font-size: 17px;
        line-height: 1.5;
        position: relative;
        word-break: break-word;
      }

      .strike-svg {
        position: absolute;
        left: 0;
        top: 50%;
        width: 100%;
        height: 14px;
        transform: translateY(-50%);
        overflow: visible;
        pointer-events: none;
      }
      .strike-svg path {
        fill: none;
        stroke: var(--red);
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
      }
      li.task.done .strike-svg path {
        animation: draw-strike 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes draw-strike {
        to {
          stroke-dashoffset: 0;
        }
      }

      li.task.done .task-text {
        color: var(--graphite);
      }

      .del-btn {
        flex: 0 0 auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--paper-line);
        background: none;
        border: none;
        cursor: pointer;
        opacity: 0;
        transition:
          opacity 0.15s ease,
          color 0.15s ease;
        padding: 0 4px;
      }
      li.task:hover .del-btn {
        opacity: 1;
        color: var(--red);
      }

      .empty {
        font-style: italic;
        color: var(--graphite);
        font-size: 15px;
        padding: 20px 0;
      }

      footer {
        margin-top: 30px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--ink-soft);
        letter-spacing: 0.04em;
        display: flex;
        justify-content: space-between;
      }

      @media (max-width: 560px) {
        .page {
          padding: 48px 20px 100px 56px;
        }
        .page::before {
          left: 32px;
        }
        h1 {
          font-size: 27px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .checkbox.checked svg path,
        li.task.done .strike-svg path {
          animation: none;
          stroke-dashoffset: 0;
        }
      }

      .checkbox:focus-visible,
      .add-btn:focus-visible,
      .entry-row input:focus-visible {
        outline: 2px solid var(--red);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="torn"></div>
      <header>
        <div class="eyebrow">Ledger · No. 1</div>
        <h1>Today's Entries</h1>
        <div class="date" id="dateLine"></div>
      </header>

      <div class="entry-row">
        <input
          type="text"
          id="taskInput"
          placeholder="Write a new entry…"
          autocomplete="off"
        />
        <button class="add-btn" id="addBtn">Add</button>
      </div>

      <ul class="list" id="taskList"></ul>
      <div class="empty" id="emptyState" style="display: none">
        Nothing entered yet. The page is waiting.
      </div>

      <footer>
        <span id="remainingCount">0 remaining</span>
        <span id="doneCount">0 done</span>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "ledger-tasks";
      let tasks = [];

      const listEl = document.getElementById("taskList");
      const emptyEl = document.getElementById("emptyState");
      const inputEl = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const remainingEl = document.getElementById("remainingCount");
      const doneEl = document.getElementById("doneCount");
      const dateLine = document.getElementById("dateLine");

      dateLine.textContent = new Date().toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
      });

      function uid() {
        return "t" + Date.now() + Math.random().toString(36).slice(2, 7);
      }

      async function loadTasks() {
        try {
          const res = await window.storage.get(STORAGE_KEY, false);
          tasks = res && res.value ? JSON.parse(res.value) : [];
        } catch (e) {
          tasks = [];
        }
        render();
      }

      async function saveTasks() {
        try {
          await window.storage.set(STORAGE_KEY, JSON.stringify(tasks), false);
        } catch (e) {
          console.error("Could not save tasks", e);
        }
      }

      function addTask() {
        const text = inputEl.value.trim();
        if (!text) return;
        tasks.push({ id: uid(), text, done: false });
        inputEl.value = "";
        render();
        saveTasks();
      }

      function toggleTask(id) {
        const t = tasks.find((t) => t.id === id);
        if (t) {
          t.done = !t.done;
        }
        render();
        saveTasks();
      }

      function deleteTask(id) {
        tasks = tasks.filter((t) => t.id !== id);
        render();
        saveTasks();
      }

      function render() {
        listEl.innerHTML = "";
        emptyEl.style.display = tasks.length === 0 ? "block" : "none";

        tasks.forEach((t) => {
          const li = document.createElement("li");
          li.className = "task" + (t.done ? " done" : "");

          const checkbox = document.createElement("div");
          checkbox.className = "checkbox" + (t.done ? " checked" : "");
          checkbox.setAttribute("role", "checkbox");
          checkbox.setAttribute("aria-checked", String(t.done));
          checkbox.tabIndex = 0;
          checkbox.innerHTML =
            '<svg viewBox="0 0 22 22"><path d="M5 11.5 L9.5 16 L17 6.5"/></svg>';
          checkbox.addEventListener("click", () => toggleTask(t.id));
          checkbox.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggleTask(t.id);
            }
          });

          const textWrap = document.createElement("div");
          textWrap.className = "task-text";
          textWrap.textContent = t.text;

          const strikeSvg = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg",
          );
          strikeSvg.setAttribute("class", "strike-svg");
          strikeSvg.setAttribute("viewBox", "0 0 100 14");
          strikeSvg.setAttribute("preserveAspectRatio", "none");
          strikeSvg.innerHTML = '<path d="M1 7 Q 50 3 99 7" />';
          textWrap.appendChild(strikeSvg);

          const delBtn = document.createElement("button");
          delBtn.className = "del-btn";
          delBtn.textContent = "✕";
          delBtn.setAttribute("aria-label", "Delete entry");
          delBtn.addEventListener("click", () => deleteTask(t.id));

          li.appendChild(checkbox);
          li.appendChild(textWrap);
          li.appendChild(delBtn);
          listEl.appendChild(li);
        });

        const remaining = tasks.filter((t) => !t.done).length;
        const done = tasks.filter((t) => t.done).length;
        remainingEl.textContent = remaining + " remaining";
        doneEl.textContent = done + " done";
      }

      addBtn.addEventListener("click", addTask);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTask();
      });

      loadTasks();
    </script>
  </body>
</html>
